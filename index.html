<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <title>Testing Zone</title>
</head>

<body>
    
    
  <div class="header">
    <div class="header__title">
      <p>Etch-a-Sketch!</p>
    </div>

    <div class="header__description">
      <p>Play with the grid. Sketch something beatiful!</p>
    </div>

    <div class="header__options">
      <button type="button" class="bttn-set-size">Set Grid Size</button>
      <button type="button" class="bttn-solid-color">Color: Solid</button>
      <button type="button" class="bttn-random-color">Color: Random</button>
      <button type="button" class="bttn-clean">Clean it!</button>
    </div>

    
  </div>


  <div class="playzone">
      
    <div class="playzone__grid">

      <div class="grid__row">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>

      <div class="grid__row">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>

      <div class="grid__row">
        <div class="square"></div>
        <div class="square"></div>
        <div class="square"></div>
      </div>

    </div>
  </div>
        
</body>

</html>
