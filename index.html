<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <title>Sketch something beautiful!</title>
</head>

<body>
    
    
  <div class="header">
    <div class="header__title">
      <p>Etch-a-Sketch!</p>
    </div>

    <div class="header__description">
      <p>Play with the grid. Sketch something beautiful!</p>
      <p>(Just keep the left click down and start making art)</p>
    </div>

    <div class="header__options">
      <button type="button" class="bttn-set-size" data-option="size">Set Grid Size</button>
      <button type="button" class="bttn-solid-color" data-option="solid-color">Color: Solid</button>
      <button type="button" class="bttn-random-color" data-option="random-color">Color: Random</button>
      <button type="button" class="bttn-clean" data-option="clean">Clean it!</button>
      <input type="color" value="#3d3575" class="input-select-color" data-option="pick-color">
    </div>
    
  </div>


  <div class="playzone">
      
    <div class="playzone__grid" data-sketch="grid">

    </div>
  </div>
        
</body>

</html>
